<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Админ-панель - Fish & Berry</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #fbfaf8;
      --surface: #ffffff;
      --surface-strong: #f3f0ea;
      --ink: #211f1d;
      --muted: #706b64;
      --line: #e7e1d8;
      --accent: #b91646;
      --accent-dark: #8f1236;
      --danger: #b42318;
      --shadow: 0 18px 45px rgba(50, 38, 31, 0.10);
    }

    body {
      min-height: 100vh;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.86), rgba(251, 250, 248, 0.96)),
        radial-gradient(circle at top left, rgba(185, 22, 70, 0.10), transparent 34rem),
        var(--bg);
      color: var(--ink);
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    [hidden] {
      display: none !important;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 24px;
      background: rgba(251, 250, 248, 0.86);
      border-bottom: 1px solid rgba(231, 225, 216, 0.85);
      backdrop-filter: blur(18px);
    }

    .brand {
      display: grid;
      gap: 2px;
    }

    .brand h1 {
      font-size: 22px;
      font-weight: 800;
    }

    .brand small {
      color: var(--muted);
      font-size: 13px;
    }

    main {
      width: min(1280px, calc(100% - 32px));
      margin: 24px auto 60px;
      display: grid;
      gap: 24px;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: var(--shadow);
      padding: 20px;
    }

    .login {
      max-width: 420px;
      margin: 80px auto;
      display: grid;
      gap: 14px;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .toolbar h2 {
      font-size: 20px;
      margin-bottom: 6px;
    }

    .section-copy,
    .message {
      color: var(--muted);
      font-size: 14px;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 6px;
      padding: 10px 14px;
      background: var(--accent);
      color: #ffffff;
      font-weight: 800;
      cursor: pointer;
    }

    button:hover {
      background: var(--accent-dark);
    }

    button.secondary {
      background: #f3efe8;
      color: var(--ink);
    }

    button.secondary:hover {
      background: #e8e1d6;
    }

    button.danger {
      background: var(--danger);
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 18px;
    }

    .category-card,
    .product-card {
      display: grid;
      gap: 12px;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: linear-gradient(180deg, #ffffff, #fcfbf9);
    }

    .category-preview,
    .product-card img {
      width: 100%;
      aspect-ratio: 4 / 3;
      border-radius: 6px;
      object-fit: cover;
      background: var(--surface-strong);
    }

    .category-preview {
      border: 1px dashed var(--line);
      background-position: center;
      background-size: cover;
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    input,
    textarea,
    select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #ffffff;
      color: var(--ink);
    }

    input:focus,
    textarea:focus,
    select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(185, 22, 70, 0.12);
    }

    textarea {
      min-height: 88px;
      resize: vertical;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .check {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--ink);
      font-weight: 700;
    }

    .check input {
      width: 18px;
      height: 18px;
    }

    .empty {
      padding: 24px;
      text-align: center;
      color: var(--muted);
    }

    @media (max-width: 760px) {
      header {
        align-items: flex-start;
        flex-direction: column;
      }

      main {
        width: calc(100% - 24px);
      }

      .row {
        grid-template-columns: 1fr;
      }

    }
  </style>
</head>
<body>
  <header>
    <div class="brand">
      <h1>Fish & Berry Admin</h1>
      <small>Категории, товары и остатки магазина</small>
    </div>
    <div class="actions" id="header-actions" hidden>
      <button class="secondary" type="button" onclick="loadData()">Обновить</button>
      <button class="secondary" type="button" onclick="logout()">Выйти</button>
    </div>
  </header>

  <main>
    <section class="panel login" id="login-panel">
      <h2>Вход</h2>
      <label>
        Пароль администратора
        <input id="password" type="password" autocomplete="current-password" />
      </label>
      <div class="actions">
        <button type="button" onclick="login()">Войти</button>
      </div>
      <p class="message" id="login-message"></p>
    </section>

    <section id="admin-content" hidden>
      <section class="panel">
        <div class="toolbar">
          <div>
            <h2>Категории</h2>
            <p class="section-copy">Добавляйте категории, меняйте их название, описание, изображение и порядок на витрине.</p>
          </div>
          <button type="button" onclick="createCategory()">Добавить категорию</button>
        </div>
        <div class="grid" id="categories"></div>
      </section>

      <section class="panel">
        <div class="toolbar">
          <div>
            <h2>Каталог</h2>
            <p class="section-copy">Управление товарами, категориями, остатками, карточками и фотографиями.</p>
          </div>
          <button type="button" onclick="createProduct()">Добавить товар</button>
        </div>
        <div class="grid" id="products"></div>
      </section>
    </section>
  </main>

  <script>
    const categoriesEl = document.getElementById("categories");
    const productsEl = document.getElementById("products");
    const loginPanel = document.getElementById("login-panel");
    const adminContent = document.getElementById("admin-content");
    const headerActions = document.getElementById("header-actions");
    const loginMessage = document.getElementById("login-message");

    let categoriesState = [];

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    async function api(url, options = {}) {
      const res = await fetch(url, {
        credentials: "same-origin",
        headers: options.body instanceof FormData ? undefined : { "Content-Type": "application/json" },
        ...options
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || "Ошибка запроса");
      return data;
    }

    async function login() {
      loginMessage.textContent = "";
      try {
        await api("/api/admin/login", {
          method: "POST",
          body: JSON.stringify({ password: document.getElementById("password").value })
        });
        await loadData();
      } catch (error) {
        loginMessage.textContent = error.message;
      }
    }

    async function logout() {
      await api("/api/admin/logout", { method: "POST" }).catch(() => {});
      loginPanel.hidden = false;
      adminContent.hidden = true;
      headerActions.hidden = true;
    }

    async function loadData() {
      const [categories, products] = await Promise.all([
        api("/api/admin/categories"),
        api("/api/admin/products")
      ]);
      categoriesState = categories;
      loginPanel.hidden = true;
      adminContent.hidden = false;
      headerActions.hidden = false;
      renderCategories(categories);
      renderProducts(products, categories);
    }

    function categoryOptions(selectedId) {
      return categoriesState.map(category => `
        <option value="${category.id}" ${Number(selectedId) === Number(category.id) ? "selected" : ""}>
          ${escapeHtml(category.name)}
        </option>
      `).join("");
    }

    function readCategory(card) {
      return {
        name: card.querySelector("[name='name']").value.trim(),
        description: card.querySelector("[name='description']").value.trim(),
        image: card.querySelector("[name='image']").value.trim(),
        sortOrder: Number.parseInt(card.querySelector("[name='sortOrder']").value, 10) || 0,
        isActive: card.querySelector("[name='isActive']").checked
      };
    }

    function readProduct(card) {
      return {
        categoryId: Number.parseInt(card.querySelector("[name='categoryId']").value, 10) || null,
        title: card.querySelector("[name='title']").value.trim(),
        price: Number.parseInt(card.querySelector("[name='price']").value, 10) || 0,
        description: card.querySelector("[name='description']").value.trim(),
        image: card.querySelector("[name='image']").value.trim(),
        stock: Number.parseInt(card.querySelector("[name='stock']").value, 10) || 0,
        isActive: card.querySelector("[name='isActive']").checked
      };
    }

    function renderCategories(categories) {
      categoriesEl.innerHTML = "";
      if (!categories.length) {
        categoriesEl.innerHTML = '<div class="empty">Категорий пока нет</div>';
        return;
      }

      categories.forEach(category => {
        const card = document.createElement("article");
        card.className = "category-card";
        card.dataset.id = category.id;
        const preview = category.image
          ? `style="background-image:url('${escapeHtml(category.image)}')"`
          : "";

        card.innerHTML = `
          <div class="category-preview" ${preview}></div>
          <label>Название <input name="name" value="${escapeHtml(category.name)}"></label>
          <label>Описание <textarea name="description">${escapeHtml(category.description || "")}</textarea></label>
          <label>Изображение категории <input name="image" value="${escapeHtml(category.image || "")}"></label>
          <div class="row">
            <label>Порядок <input name="sortOrder" type="number" min="0" value="${category.sortOrder}"></label>
            <label class="check"><input name="isActive" type="checkbox" ${category.isActive ? "checked" : ""}> Показывать на витрине</label>
          </div>
          <div class="actions">
            <button type="button" onclick="saveCategory(this)">Сохранить</button>
            <button type="button" class="danger" onclick="deleteCategory(this)">Удалить</button>
          </div>
          <p class="message"></p>
        `;
        categoriesEl.appendChild(card);
      });
    }

    function renderProducts(products, categories) {
      productsEl.innerHTML = "";
      if (!products.length) {
        productsEl.innerHTML = '<div class="empty">Каталог пуст</div>';
        return;
      }

      products.forEach(product => {
        const card = document.createElement("article");
        card.className = "product-card";
        card.dataset.id = product.id;
        card.innerHTML = `
          <img src="${escapeHtml(product.image || "https://via.placeholder.com/400x300?text=Фото")}" alt="${escapeHtml(product.title)}">
          <label>Категория
            <select name="categoryId">
              ${categoryOptions(product.categoryId || categories.find(item => item.name === product.category)?.id)}
            </select>
          </label>
          <label>Название <input name="title" value="${escapeHtml(product.title)}"></label>
          <div class="row">
            <label>Цена, ₽ <input name="price" type="number" min="0" value="${product.price}"></label>
            <label>Остаток <input name="stock" type="number" min="0" value="${product.stock}"></label>
          </div>
          <label>Описание <textarea name="description">${escapeHtml(product.description)}</textarea></label>
          <label>Ссылка на фото <input name="image" value="${escapeHtml(product.image || "")}"></label>
          <label>Загрузить фото <input name="upload" type="file" accept="image/png,image/jpeg,image/webp,image/gif"></label>
          <label class="check"><input name="isActive" type="checkbox" ${product.isActive ? "checked" : ""}> Показывать в каталоге</label>
          <div class="actions">
            <button type="button" onclick="saveProduct(this)">Сохранить</button>
            <button type="button" class="danger" onclick="deleteProduct(this)">Скрыть</button>
          </div>
          <p class="message"></p>
        `;
        productsEl.appendChild(card);
      });
    }

    async function createCategory() {
      await api("/api/admin/categories", {
        method: "POST",
        body: JSON.stringify({
          name: "Новая категория",
          description: "",
          image: "",
          sortOrder: categoriesState.length + 1,
          isActive: true
        })
      });
      await loadData();
    }

    async function saveCategory(button) {
      const card = button.closest(".category-card");
      const message = card.querySelector(".message");
      button.disabled = true;
      message.textContent = "Сохраняем...";
      try {
        await api(`/api/admin/categories/${card.dataset.id}`, {
          method: "PUT",
          body: JSON.stringify(readCategory(card))
        });
        message.textContent = "Сохранено";
        await loadData();
      } catch (error) {
        message.textContent = error.message;
      } finally {
        button.disabled = false;
      }
    }

    async function deleteCategory(button) {
      if (!confirm("Удалить категорию? Товары из неё перейдут в 'Без категории'.")) return;
      const card = button.closest(".category-card");
      await api(`/api/admin/categories/${card.dataset.id}`, { method: "DELETE" });
      await loadData();
    }

    async function uploadImage(card) {
      const input = card.querySelector("[name='upload']");
      if (!input || !input.files.length) return card.querySelector("[name='image']").value.trim();

      const formData = new FormData();
      formData.append("image", input.files[0]);
      const result = await api("/api/admin/uploads", { method: "POST", body: formData });
      card.querySelector("[name='image']").value = result.url;
      return result.url;
    }

    async function createProduct() {
      const fallbackCategory = categoriesState.find(category => category.name === "Без категории") || categoriesState[0];
      await api("/api/admin/products", {
        method: "POST",
        body: JSON.stringify({
          categoryId: fallbackCategory ? fallbackCategory.id : null,
          title: "Новый товар",
          price: 0,
          description: "",
          image: "",
          stock: 0,
          isActive: true
        })
      });
      await loadData();
    }

    async function saveProduct(button) {
      const card = button.closest(".product-card");
      const message = card.querySelector(".message");
      button.disabled = true;
      message.textContent = "Сохраняем...";
      try {
        await uploadImage(card);
        await api(`/api/admin/products/${card.dataset.id}`, {
          method: "PUT",
          body: JSON.stringify(readProduct(card))
        });
        message.textContent = "Сохранено";
        await loadData();
      } catch (error) {
        message.textContent = error.message;
      } finally {
        button.disabled = false;
      }
    }

    async function deleteProduct(button) {
      if (!confirm("Скрыть товар из каталога?")) return;
      const card = button.closest(".product-card");
      await api(`/api/admin/products/${card.dataset.id}`, { method: "DELETE" });
      await loadData();
    }

    document.getElementById("password").addEventListener("keydown", event => {
      if (event.key === "Enter") login();
    });

    loginPanel.hidden = false;
    adminContent.hidden = true;
    headerActions.hidden = true;
  </script>
</body>
</html>
