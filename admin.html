<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Админ-панель - Fish & Berry</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #fbfaf8;
      --surface: #ffffff;
      --surface-strong: #f3f0ea;
      --ink: #211f1d;
      --muted: #706b64;
      --line: #e7e1d8;
      --accent: #b91646;
      --accent-dark: #8f1236;
      --shadow: 0 18px 45px rgba(50, 38, 31, 0.10);
    }

    body {
      min-height: 100vh;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.86), rgba(251, 250, 248, 0.96)),
        radial-gradient(circle at top left, rgba(185, 22, 70, 0.10), transparent 34rem),
        var(--bg);
      color: var(--ink);
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 24px;
      background: rgba(251, 250, 248, 0.86);
      border-bottom: 1px solid rgba(231, 225, 216, 0.85);
      position: sticky;
      top: 0;
      z-index: 3;
      backdrop-filter: blur(18px);
    }

    h1 {
      font-size: 22px;
      font-weight: 800;
    }

    h2 {
      font-size: 20px;
      margin-bottom: 16px;
    }

    main {
      width: min(1280px, calc(100% - 32px));
      margin: 24px auto 60px;
      display: grid;
      gap: 24px;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 20px;
      box-shadow: var(--shadow);
    }

    .login {
      max-width: 420px;
      margin: 80px auto;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 18px;
    }

    .product {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
      display: grid;
      gap: 12px;
      background: linear-gradient(180deg, #ffffff, #fcfbf9);
    }

    .product img {
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      border-radius: 6px;
      background: var(--surface-strong);
    }

    label {
      display: grid;
      gap: 6px;
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 10px 12px;
      font-size: 15px;
      background: #ffffff;
      color: var(--ink);
    }

    textarea {
      min-height: 82px;
      resize: vertical;
    }

    input:focus,
    textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(185, 22, 70, 0.12);
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .check {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
    }

    .check input {
      width: 18px;
      height: 18px;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      background: var(--accent);
      color: #ffffff;
    }

    button.secondary {
      background: #f3efe8;
      color: var(--ink);
    }

    button.danger {
      background: #b42318;
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .message {
      min-height: 22px;
      color: var(--muted);
      font-size: 14px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    th,
    td {
      text-align: left;
      vertical-align: top;
      padding: 12px 10px;
      border-bottom: 1px solid var(--line);
    }

    th {
      color: var(--muted);
      font-size: 13px;
      background: #f8f5ef;
    }

    .empty {
      padding: 24px;
      text-align: center;
      color: var(--muted);
    }

    .admin-brand {
      display: grid;
      gap: 2px;
    }

    .admin-brand small {
      color: var(--muted);
      font-size: 13px;
    }

    .section-copy {
      color: var(--muted);
      font-size: 14px;
    }

    @media (max-width: 720px) {
      header {
        align-items: flex-start;
        flex-direction: column;
      }

      .row {
        grid-template-columns: 1fr;
      }

      table,
      thead,
      tbody,
      tr,
      th,
      td {
        display: block;
      }

      thead {
        display: none;
      }

      tr {
        border: 1px solid #ececf3;
        border-radius: 8px;
        margin-bottom: 12px;
        padding: 8px;
      }

      td {
        border: 0;
        padding: 6px;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="admin-brand">
      <h1>Fish & Berry Admin</h1>
      <small>Каталог, остатки и заказы магазина</small>
    </div>
    <div class="actions" id="header-actions" hidden>
      <button class="secondary" type="button" onclick="loadData()">Обновить</button>
      <button class="secondary" type="button" onclick="logout()">Выйти</button>
    </div>
  </header>

  <main>
    <section class="panel login" id="login-panel">
      <h2>Вход</h2>
      <label>
        Пароль администратора
        <input id="password" type="password" autocomplete="current-password" />
      </label>
      <div class="actions" style="margin-top: 14px;">
        <button type="button" onclick="login()">Войти</button>
      </div>
      <p class="message" id="login-message"></p>
    </section>

    <section id="admin-content" hidden>
      <section class="panel">
        <div class="toolbar">
          <div>
            <h2>Каталог</h2>
            <p class="section-copy">Меняйте категории, остатки, карточки и фотографии товаров.</p>
          </div>
          <button type="button" onclick="createProduct()">Добавить товар</button>
        </div>
        <div class="grid" id="products"></div>
      </section>

      <section class="panel">
        <div class="toolbar">
          <div>
            <h2>Последние заказы</h2>
            <p class="section-copy">Текущая лента заказов из базы. Google Sheets продолжает работать отдельно.</p>
          </div>
        </div>
        <div id="orders"></div>
      </section>
    </section>
  </main>

  <script>
    const productsEl = document.getElementById("products");
    const ordersEl = document.getElementById("orders");
    const loginPanel = document.getElementById("login-panel");
    const adminContent = document.getElementById("admin-content");
    const headerActions = document.getElementById("header-actions");
    const loginMessage = document.getElementById("login-message");

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    async function api(url, options = {}) {
      const res = await fetch(url, {
        credentials: "same-origin",
        headers: options.body instanceof FormData ? undefined : { "Content-Type": "application/json" },
        ...options
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || "Ошибка запроса");
      return data;
    }

    async function login() {
      loginMessage.textContent = "";
      try {
        await api("/api/admin/login", {
          method: "POST",
          body: JSON.stringify({ password: document.getElementById("password").value })
        });
        await loadData();
      } catch (error) {
        loginMessage.textContent = error.message;
      }
    }

    async function logout() {
      await api("/api/admin/logout", { method: "POST" }).catch(() => {});
      loginPanel.hidden = false;
      adminContent.hidden = true;
      headerActions.hidden = true;
    }

    async function loadData() {
      const [products, orders] = await Promise.all([
        api("/api/admin/products"),
        api("/api/admin/orders")
      ]);
      loginPanel.hidden = true;
      adminContent.hidden = false;
      headerActions.hidden = false;
      renderProducts(products);
      renderOrders(orders);
    }

    function readProduct(card) {
      return {
        category: card.querySelector("[name='category']").value.trim(),
        title: card.querySelector("[name='title']").value.trim(),
        price: Number.parseInt(card.querySelector("[name='price']").value, 10) || 0,
        description: card.querySelector("[name='description']").value.trim(),
        image: card.querySelector("[name='image']").value.trim(),
        stock: Number.parseInt(card.querySelector("[name='stock']").value, 10) || 0,
        isActive: card.querySelector("[name='isActive']").checked
      };
    }

    function renderProducts(products) {
      productsEl.innerHTML = "";
      if (!products.length) {
        productsEl.innerHTML = '<div class="empty">Каталог пуст</div>';
        return;
      }

      products.forEach(product => {
        const card = document.createElement("article");
        card.className = "product";
        card.dataset.id = product.id;
        card.innerHTML = `
          <img src="${escapeHtml(product.image || "https://via.placeholder.com/400x300?text=Фото")}" alt="${escapeHtml(product.title)}">
          <label>Категория <input name="category" list="category-options" value="${escapeHtml(product.category || "Без категории")}" placeholder="Например: Рыба, Ягоды, Консервы"></label>
          <label>Название <input name="title" value="${escapeHtml(product.title)}"></label>
          <div class="row">
            <label>Цена, ₽ <input name="price" type="number" min="0" value="${product.price}"></label>
            <label>Остаток <input name="stock" type="number" min="0" value="${product.stock}"></label>
          </div>
          <label>Описание <textarea name="description">${escapeHtml(product.description)}</textarea></label>
          <label>Ссылка на фото <input name="image" value="${escapeHtml(product.image)}"></label>
          <label>Загрузить фото <input name="upload" type="file" accept="image/png,image/jpeg,image/webp,image/gif"></label>
          <label class="check"><input name="isActive" type="checkbox" ${product.isActive ? "checked" : ""}> Показывать в каталоге</label>
          <div class="actions">
            <button type="button" onclick="saveProduct(this)">Сохранить</button>
            <button type="button" class="danger" onclick="deleteProduct(this)">Скрыть</button>
          </div>
          <p class="message"></p>
        `;
        productsEl.appendChild(card);
      });
    }

    async function uploadImage(card) {
      const input = card.querySelector("[name='upload']");
      if (!input.files.length) return card.querySelector("[name='image']").value.trim();

      const formData = new FormData();
      formData.append("image", input.files[0]);
      const result = await api("/api/admin/uploads", { method: "POST", body: formData });
      card.querySelector("[name='image']").value = result.url;
      return result.url;
    }

    async function saveProduct(button) {
      const card = button.closest(".product");
      const message = card.querySelector(".message");
      button.disabled = true;
      message.textContent = "Сохраняем...";

      try {
        await uploadImage(card);
        const product = readProduct(card);
        const saved = await api(`/api/admin/products/${card.dataset.id}`, {
          method: "PUT",
          body: JSON.stringify(product)
        });
        card.querySelector("img").src = saved.image || "https://via.placeholder.com/400x300?text=Фото";
        message.textContent = "Сохранено";
      } catch (error) {
        message.textContent = error.message;
      } finally {
        button.disabled = false;
      }
    }

    async function createProduct() {
      await api("/api/admin/products", {
        method: "POST",
        body: JSON.stringify({
          category: "Без категории",
          title: "Новый товар",
          price: 0,
          description: "",
          image: "",
          stock: 0,
          isActive: true
        })
      });
      await loadData();
    }

    async function deleteProduct(button) {
      if (!confirm("Скрыть товар из каталога?")) return;
      const card = button.closest(".product");
      await api(`/api/admin/products/${card.dataset.id}`, { method: "DELETE" });
      await loadData();
    }

    function renderOrders(orders) {
      if (!orders.length) {
        ordersEl.innerHTML = '<div class="empty">Заказов пока нет</div>';
        return;
      }

      ordersEl.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>Заказ</th>
              <th>Клиент</th>
              <th>Товары</th>
              <th>Получение</th>
              <th>Итого</th>
              <th>Статус</th>
            </tr>
          </thead>
          <tbody>
            ${orders.map(order => `
              <tr>
                <td>#${order.id}<br>${new Date(order.created_at).toLocaleString("ru-RU")}</td>
                <td>${escapeHtml(order.customer_name)}<br>${escapeHtml(order.customer_phone)}${order.comment ? `<br>${escapeHtml(order.comment)}` : ""}</td>
                <td>${order.items.map(item => `${escapeHtml(item.title)} x ${item.quantity}`).join("<br>")}</td>
                <td>${escapeHtml(order.delivery_name)}<br>${Number(order.delivery_price).toLocaleString("ru-RU")} ₽</td>
                <td>${Number(order.total).toLocaleString("ru-RU")} ₽</td>
                <td>${escapeHtml(order.status)}</td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      `;
    }

    document.getElementById("password").addEventListener("keydown", event => {
      if (event.key === "Enter") login();
    });

    loadData().catch(() => {
      loginPanel.hidden = false;
      adminContent.hidden = true;
      headerActions.hidden = true;
    });
  </script>
  <datalist id="category-options">
    <option value="Рыба"></option>
    <option value="Ягоды"></option>
    <option value="Консервы"></option>
    <option value="Десерты"></option>
    <option value="Подарочные наборы"></option>
    <option value="Соусы и закуски"></option>
    <option value="Без категории"></option>
  </datalist>
</body>
</html>
